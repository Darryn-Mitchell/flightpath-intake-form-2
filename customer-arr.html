<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer ARR</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page wizard-page">
      <div class="wizard-card">
        <header class="wizard-header">
          <p class="section-label">Customer ARR</p>
          <p id="customer-name" class="customer-name"></p>
        </header>

        <div id="question-pane" class="question-pane active">
          <form id="arr-form">
            <div class="field">
              <label for="arr-range">
                What is the customers current year ARR?
              </label>
              <select id="arr-range" name="arrRange" required>
                <option value="" disabled selected>Select an ARR range</option>
                <option value="100k-500k">$100k - $500k</option>
                <option value="500k-1.5m">$500k - $1.5M</option>
                <option value="1.5m-3m">$1.5M - $3M</option>
                <option value="3m-5m">$3M - $5M</option>
                <option value="5m-plus">$5M+</option>
              </select>
            </div>

            <p id="status-message" class="form-message" role="status"></p>

            <div class="actions">
              <button type="submit" id="submit-btn" class="primary-btn">
                Submit
              </button>
            </div>
          </form>
        </div>

        <div id="complete-pane" class="question-pane">
          <p class="step-label">Section complete</p>
          <h1 class="question-title">Customer ARR complete</h1>
          <p class="result-text">
            Selected: <strong id="final-selection"></strong>
          </p>
          <p class="result-text">
            Score recorded: <strong id="final-score"></strong>
          </p>
          <p id="complete-message" class="form-message" role="status"></p>
        </div>

        <div id="error-pane" class="question-pane">
          <h1 class="question-title">Unable to load assessment</h1>
          <p id="error-message" class="form-message error"></p>
        </div>
      </div>
    </main>

    <iframe
      id="submit-frame"
      name="submit-frame"
      class="hidden"
      title="Form submission"
    ></iframe>
    <form id="sheet-submit-form" method="POST" target="submit-frame" class="hidden"></form>

    <script src="config.js"></script>
    <script src="sections.js"></script>
    <script src="sheet.js"></script>
    <script src="customer-arr.js"></script>
  </body>
</html>
