<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlightPath Intake Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page landing-page">
      <div class="landing-card">
        <header class="landing-header">
          <h1>FlightPath Intake</h1>
          <p id="active-customer" class="customer-name hidden"></p>
        </header>

        <button type="button" id="open-form-btn" class="primary-btn">
          FlightPath Intake Form
        </button>

        <section class="status-panel" aria-labelledby="status-title">
          <h2 id="status-title">Assessment Progress</h2>
          <p id="status-hint" class="status-hint">
            Complete the intake form to begin tracking assessment progress.
          </p>
          <ul id="section-status-list" class="section-status-list"></ul>
        </section>

        <section
          id="recommendation-panel"
          class="recommendation-panel hidden"
          aria-labelledby="recommendation-title"
        >
          <h2 id="recommendation-title">Recommendation</h2>
          <p id="flightpath-recommendation" class="flightpath-recommendation"></p>
        </section>
      </div>
    </main>

    <div id="form-overlay" class="overlay hidden" aria-hidden="true">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="form-title"
      >
        <header class="modal-header">
          <h1 id="form-title">FlightPath Intake Form</h1>
          <button
            type="button"
            id="close-form-btn"
            class="icon-btn"
            aria-label="Close form"
          >
            &times;
          </button>
        </header>

        <form id="intake-form" novalidate>
          <div class="field">
            <label for="salesforce-name">
              What is the Salesforce Name of the Customer?
            </label>
            <input
              id="salesforce-name"
              name="salesforceName"
              type="text"
              required
              autocomplete="organization"
              placeholder="Enter customer Salesforce name"
            />
          </div>

          <div class="field">
            <label for="segment">What segment is this customer in?</label>
            <select id="segment" name="segment" required>
              <option value="" disabled selected>Select a segment</option>
              <option value="Enterprise">Enterprise</option>
              <option value="Commercial Corporate">Commercial Corporate</option>
              <option value="Commercial Territory">Commercial Territory</option>
            </select>
          </div>

          <div class="field">
            <label for="region">
              What region is the customer mainly based in?
            </label>
            <select id="region" name="region" required>
              <option value="" disabled selected>Select a region</option>
              <option value="EMEA">EMEA</option>
              <option value="LATAM">LATAM</option>
              <option value="North America">North America</option>
              <option value="APAC">APAC</option>
            </select>
          </div>

          <p id="form-message" class="form-message" role="status"></p>

          <div class="actions">
            <button type="button" id="cancel-form-btn" class="secondary-btn">
              Cancel
            </button>
            <button type="submit" id="submit-form-btn" class="primary-btn">
              Submit
            </button>
          </div>
        </form>
      </div>
    </div>

    <iframe
      id="submit-frame"
      name="submit-frame"
      class="hidden"
      title="Form submission"
    >....</iframe>
    <form id="sheet-submit-form" method="POST" target="submit-frame" class="hidden"></form>

    <script src="config.js"></script>
    <script src="sections.js"></script>
    <script src="sheet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
