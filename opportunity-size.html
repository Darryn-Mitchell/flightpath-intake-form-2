<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opportunity Size</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page wizard-page">
      <div class="wizard-card">
        <header class="wizard-header">
          <p class="section-label">Opportunity Size</p>
          <p id="customer-name" class="customer-name"></p>
        </header>

        <div id="question-pane" class="question-pane active">
          <form id="opportunity-form">
            <div class="field">
              <label for="opportunity-size">
                What is the current opportunity size?
              </label>
              <div class="currency-input">
                <span class="currency-prefix" aria-hidden="true">$</span>
                <input
                  id="opportunity-size"
                  name="opportunitySize"
                  type="text"
                  inputmode="decimal"
                  required
                  placeholder="insert number here"
                  autocomplete="off"
                />
              </div>
            </div>

            <p id="status-message" class="form-message" role="status"></p>

            <div class="actions">
              <button type="submit" id="submit-btn" class="primary-btn">
                Submit
              </button>
            </div>
          </form>
        </div>

        <div id="complete-pane" class="question-pane">
          <p class="step-label">Section complete</p>
          <h1 class="question-title">Opportunity Size complete</h1>
          <p class="result-text">
            Recorded: <strong id="final-value"></strong>
          </p>
          <p id="complete-message" class="form-message" role="status"></p>
        </div>

        <div id="error-pane" class="question-pane">
          <h1 class="question-title">Unable to load assessment</h1>
          <p id="error-message" class="form-message error"></p>
        </div>
      </div>
    </main>

    <iframe
      id="submit-frame"
      name="submit-frame"
      class="hidden"
      title="Form submission"
    ></iframe>
    <form id="sheet-submit-form" method="POST" target="submit-frame" class="hidden"></form>

    <script src="config.js"></script>
    <script src="sections.js"></script>
    <script src="sheet.js"></script>
    <script src="opportunity-size.js"></script>
  </body>
</html>
