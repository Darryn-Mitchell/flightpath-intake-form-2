<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Technology - FlightPath Assessment</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page section-page">
      <div class="section-card">
        <header class="section-header">
          <h1>Customer Technology</h1>
          <p id="customer-name" class="customer-name"></p>
        </header>

        <form id="section-form">
          <div class="field">
            <label for="tech-level">
              What is the customer's technology sophistication level?
            </label>
            <select id="tech-level" name="selectedValue" required>
              <option value="" disabled selected>Select technology level</option>
              <option value="Advanced/Cutting-edge" data-score="5">Advanced/Cutting-edge (5 points)</option>
              <option value="Modern stack" data-score="4">Modern stack (4 points)</option>
              <option value="Standard" data-score="3">Standard (3 points)</option>
              <option value="Legacy systems" data-score="2">Legacy systems (2 points)</option>
              <option value="Very outdated" data-score="1">Very outdated (1 point)</option>
            </select>
          </div>

          <p id="form-message" class="form-message" role="status"></p>

          <div class="actions">
            <button type="submit" id="submit-btn" class="primary-btn">Continue</button>
          </div>
        </form>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="sections.js"></script>
    <script src="sheet.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const salesforceName = params.get('salesforceName');
      const submissionId = params.get('submissionId');
      document.getElementById('customer-name').textContent = salesforceName || '';

      const form = document.getElementById('section-form');
      const submitBtn = document.getElementById('submit-btn');
      const messageEl = document.getElementById('form-message');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const selectEl = document.getElementById('tech-level');
        const selectedOption = selectEl.options[selectEl.selectedIndex];
        const score = parseInt(selectedOption.dataset.score);
        const selectedValue = selectedOption.value;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';

        try {
          await submitSectionSelection({
            type: 'customerTechnology',
            submissionId,
            selectedValue,
            score
          });
          messageEl.textContent = 'Saved!';
          messageEl.className = 'form-message success';
          finishSectionWindow('customerTechnology', score);
        } catch (error) {
          messageEl.textContent = error.message || 'Failed to save.';
          messageEl.className = 'form-message error';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Continue';
        }
      });
    </script>
  </body>
</html>
